name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag della release GitHub (es. v3.0.0)
        required: true
        default: v3.0.0

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6

      - name: Build modular release assets
        run: |
          python build_release.py --tag "${{ inputs.release_tag }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlannerTurni-windows-release
          path: release/*
          if-no-files-found: error

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ inputs.release_tag }}" --repo "${{ github.repository }}"
          if ($LASTEXITCODE -eq 0) {
            gh release upload "${{ inputs.release_tag }}" release\* --clobber --repo "${{ github.repository }}"
          } else {
            gh release create "${{ inputs.release_tag }}" release\* --title "${{ inputs.release_tag }}" --generate-notes --repo "${{ github.repository }}"
          }
