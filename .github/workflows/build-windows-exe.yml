name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag della release GitHub (es. v3.0.0)
        required: true
        default: v3.0.0
      release_mode:
        description: Tipo di release
        required: true
        default: app-only

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      RELEASE_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.release_mode || 'full' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6

      - name: Build modular release assets
        run: |
          python build_release.py --tag "${env:RELEASE_TAG}" --mode "${env:RELEASE_MODE}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlannerTurni-windows-release
          path: release/*
          if-no-files-found: error

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseFiles = @(Get-ChildItem -Path "release" -File | ForEach-Object { $_.FullName })
          if (-not $releaseFiles.Count) {
            throw "Nessun file di release trovato."
          }
          gh release view "${env:RELEASE_TAG}" --repo "${{ github.repository }}"
          if ($LASTEXITCODE -eq 0) {
            gh release upload "${env:RELEASE_TAG}" $releaseFiles --clobber --repo "${{ github.repository }}"
          } else {
            gh release create "${env:RELEASE_TAG}" $releaseFiles --title "${env:RELEASE_TAG}" --generate-notes --repo "${{ github.repository }}"
          }
