name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag della release GitHub (es. v3.0.0)
        required: true
        default: v3.0.0

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6

      - name: Build modular release assets
        run: |
          python build_release.py --tag "${env:RELEASE_TAG}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlannerTurni-windows-release
          path: |
            release/PlannerTurniInstaller.exe
            release/PlannerTurniLauncher.exe
            release/planner-release-manifest.json
            release/planner-app-win64.zip
            release/planner-runtime-win64.zip
            release/planner-portable-win64.zip
          if-no-files-found: error

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseFiles = @(
            "release\PlannerTurniInstaller.exe",
            "release\PlannerTurniLauncher.exe",
            "release\planner-release-manifest.json",
            "release\planner-app-win64.zip",
            "release\planner-runtime-win64.zip",
            "release\planner-portable-win64.zip"
          )
          gh release view "${env:RELEASE_TAG}" --repo "${{ github.repository }}"
          if ($LASTEXITCODE -eq 0) {
            gh release upload "${env:RELEASE_TAG}" $releaseFiles --clobber --repo "${{ github.repository }}"
          } else {
            gh release create "${env:RELEASE_TAG}" $releaseFiles --title "${env:RELEASE_TAG}" --generate-notes --repo "${{ github.repository }}"
          }
