name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6

      - name: Build executable
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name PlannerTurni app.py
          if (Test-Path "planner_data.json") {
            Copy-Item "planner_data.json" "dist/planner_data.json" -Force
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlannerTurni-windows
          path: |
            dist/PlannerTurni.exe
            dist/planner_data.json
          if-no-files-found: error
